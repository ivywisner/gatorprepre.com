name: IndexNow ping

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for GitHub Pages deploy
        run: sleep 120

      - name: Collect URLs and ping IndexNow
        env:
          HOST: gatorprepre.com
          KEY: 33b5bb258fb1cb3a616f3e4ba09ca53a
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
        run: |
          set -e
          if [ "$EVENT" = "workflow_dispatch" ]; then
            # Manual run: submit every URL in the sitemap
            URLS=$(grep -o '<loc>[^<]*</loc>' sitemap.xml | sed -e 's|<loc>||g' -e 's|</loc>||g')
          else
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              BEFORE=$(git rev-parse "$SHA~1")
            fi
            URLS=""
            for f in $(git diff --name-only "$BEFORE" "$SHA" -- '*.html'); do
              case "$f" in
                index.html) URLS="$URLS https://$HOST/" ;;
                *) URLS="$URLS https://$HOST/$f" ;;
              esac
            done
          fi
          URLS=$(echo $URLS | xargs -n1 | sort -u)
          if [ -z "$URLS" ]; then echo "No page changes - skipping ping."; exit 0; fi
          echo "Submitting to IndexNow:"; echo "$URLS"
          jq -n --arg host "$HOST" --arg key "$KEY" --arg keyLocation "https://$HOST/$KEY.txt" \
            '{host:$host, key:$key, keyLocation:$keyLocation, urlList:$ARGS.positional}' \
            --args $URLS > payload.json
          CODE=$(curl -s -o response.txt -w '%{http_code}' -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' --data @payload.json)
          echo "IndexNow responded HTTP $CODE"; cat response.txt || true
          [ "$CODE" = "200" ] || [ "$CODE" = "202" ]
